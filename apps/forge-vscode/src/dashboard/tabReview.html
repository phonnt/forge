<div id="review-form">
  <div class="form-group">
    <label>URL <span style="color:var(--vscode-inputValidation-errorForeground)">*</span></label>
    <input id="rv-url" type="text" placeholder="https://github.com/owner/repo/pull/42" />
    <div class="hint" id="rv-url-error" style="color:var(--vscode-inputValidation-errorForeground);display:none">Invalid PR/MR URL</div>
  </div>
  <div class="form-group">
    <label>Rules file</label>
    <input id="rv-rules" type="text" placeholder=".forge/rules.md" value=".forge/rules.md" />
  </div>
  <div class="form-group">
    <label>Output format</label>
    <div class="radio-group">
      <label><input type="radio" name="rv-format" value="markdown" checked /> Markdown</label>
      <label><input type="radio" name="rv-format" value="json" /> JSON</label>
    </div>
  </div>
  <button id="rv-submit">Start Review</button>
</div>
<div id="review-progress" class="progress" style="display:none"><span class="spinner">&#9696;</span> <span id="rv-progress-text">Analyzing...</span></div>
<div id="review-summary" class="summary"></div>
<div id="review-findings"></div>
